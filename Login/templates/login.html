{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>System Login | Diabetes Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #0284c7;    /* Clinical Blue */
      --navy-900: #0f172a;       /* Authority Navy */
      --slate-500: #64748b;      /* Professional Gray */
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: 
        linear-gradient(110deg, rgba(255, 255, 255, 0.96) 35%, rgba(241, 245, 249, 0.8) 100%),
        url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=2070&auto=format&fit=crop');
      
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      color: var(--navy-900);
      margin: 0;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(var(--primary-blue) 0.5px, transparent 0.5px);
      background-size: 30px 30px;
      opacity: 0.05;
      z-index: -1;
    }

    .login-container {
      width: 100%;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #ffffff;
      box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.1) !important;
      border-radius: 20px !important;
      overflow: hidden;
    }

    .card-header {
      background: transparent !important;
      border-bottom: none;
      padding-top: 2.5rem;
    }

    .card-header h4 {
      font-family: var(--font-main);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--navy-900);
      font-size: 1.75rem;
    }

    .form-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--slate-500);
      margin-bottom: 8px;
    }

    .form-control {
      padding: 0.85rem 1.1rem;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
      background-color: #fff;
    }

    .btn-login {
      background-color: var(--navy-900);
      border: none;
      color: white;
      padding: 1rem;
      font-weight: 600;
      border-radius: 12px;
      margin-top: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
    }

    .btn-login:hover {
      background-color: var(--primary-blue);
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(2, 132, 199, 0.3);
      color: white;
    }

    .card-footer {
      background: transparent !important;
      border-top: none;
      padding-bottom: 2.5rem;
    }

    /* Added Style for Forget Password Link */
    .forget-password-link {
      color: var(--slate-500);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .forget-password-link:hover {
      color: var(--primary-blue);
    }

    @media (max-width: 576px) {
      body { background: #f8fafc; }
      .card { border: none; box-shadow: none !important; background: transparent; }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
        
        <div class="card">
          <div class="card-header text-center">
            <h4 class="mb-0">Sign In</h4>
            <p class="text-muted small mt-2">Access the Intelligence Portal</p>
          </div>
          
          <div class="card-body px-4 pb-4">
            <form method="post">
              {% csrf_token %}

              <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="name@organization.com" name="email" required>
              </div>
              
              <div class="mb-2"> <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter Password" name="password" required>
              </div>

              <div class="text-end mb-4">
                <a href="{% url 'forget_password' %}" class="forget-password-link">Forgot Password?</a>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-login">Authorize & Continue</button>
              </div>
            </form>
          </div>

          {% if msg %}
          <div class="card-footer text-center">
            <div class="alert alert-light border-0 text-danger p-0 m-0 fw-bold small">
              <i class="bi bi-exclamation-circle me-1"></i> {{ msg }}
            </div>
          </div>
          {% endif %}
        </div>
        
        <div class="text-center mt-4">
          <small class="text-muted" style="letter-spacing: 1px;">&copy; 2026 CLINICAL PREDICTION SYSTEMS</small>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
