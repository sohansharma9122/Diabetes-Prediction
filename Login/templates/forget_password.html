{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password | ClinicaAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --navy-900: #0f172a; 
            --primary-blue: #0284c7; 
            --slate-500: #64748b;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        
        body { 
            font-family: var(--font-body); 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            /* EXACT SAME BACKGROUND AS HOME PAGE */
            background: 
                linear-gradient(115deg, rgba(255, 255, 255, 0.96) 35%, rgba(241, 245, 249, 0.8) 100%),
                url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Hero dots pattern from Home page */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--primary-blue) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            opacity: 0.05;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
        }

        .card { 
            border-radius: 24px; 
            border: 1px solid rgba(2, 132, 199, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15); 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card-title {
            font-family: var(--font-main);
            color: var(--navy-900);
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .form-label {
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--slate-500);
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
            outline: none;
        }

        .btn-update { 
            background: var(--navy-900); 
            color: #fff; 
            border-radius: 14px; 
            padding: 16px; 
            font-weight: 600; 
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
            margin-top: 10px;
        }

        .btn-update:hover { 
            background: var(--primary-blue); 
            color: #fff; 
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(2, 132, 199, 0.3);
        }

        .back-link {
            color: var(--slate-500);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-blue);
        }

        /* Alert styling */
        .custom-alert {
            border-radius: 12px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center w-100 m-0">
        <div class="col-md-6 col-lg-4">
            <div class="card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <span class="badge bg-info bg-opacity-10 text-info px-3 py-2 rounded-pill" style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">
                            <i class="bi bi-shield-lock-fill me-1"></i> Security Update
                        </span>
                    </div>
                    <h3 class="card-title h3 mb-2">Reset Password</h3>
                    <p class="text-muted small">Enter your registered details to update your secure access.</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Registered Email</label>
                        <div class="input-group">
                            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_pwd" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-update">
                            Update Password <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                        <div class="text-center mt-3">
                            <a href="{% url 'login' %}" class="back-link">
                                <i class="bi bi-chevron-left small"></i> Back to Login
                            </a>
                        </div>
                    </div>
                </form>

                {% if MSG %}
                <div class="mt-4">
                    <div class="alert custom-alert p-3 mb-0 {% if 'Successful' in MSG %}bg-success bg-opacity-10 text-success{% else %}bg-danger bg-opacity-10 text-danger{% endif %} text-center">
                        <i class="bi {% if 'Successful' in MSG %}bi-check-circle-fill{% else %}bi-exclamation-triangle-fill{% endif %} me-2"></i>
                        {{ MSG }}
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
