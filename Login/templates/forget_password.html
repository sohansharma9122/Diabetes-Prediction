{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password | ClinicaAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy-900: #0f172a; --primary-blue: #0284c7; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 60px 0; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-black { background: #000; color: #fff; border-radius: 10px; padding: 12px; font-weight: 600; }
        .btn-black:hover { background: #222; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Reset Password</h3>
                    <p class="text-muted small">Enter your email to update password</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">REGISTERED EMAIL</label>
                        <input type="email" name="email" class="form-control" placeholder="xyz@gmail.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">NEW PASSWORD</label>
                        <input type="password" name="new_pwd" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-black">Update Password</button>
                        <a href="{% url 'login' %}" class="btn btn-link text-decoration-none text-muted small">Back to Login</a>
                    </div>
                </form>

                {% if MSG %}
                <div class="mt-3 text-center">
                    <div class="alert {% if 'Successful' in MSG %}alert-success{% else %}alert-danger{% endif %} small py-2">
                        {{ MSG }}
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

</body>
</html>
