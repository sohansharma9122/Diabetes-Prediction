{% load static %}

<nav class="navbar navbar-expand-lg main-navbar-header">
  <div class="container-fluid px-lg-5">
    
    <a href="{% url 'home' %}" class="navbar-brand d-flex align-items-center">
      <img src="{% static 'images/diabetes_logo1.png' %}" width="35" height="35" class="rounded me-2" alt="Logo">
      <span class="brand-name">Clinica<span class="text-primary-blue">AI</span></span>
    </a>

    <div class="d-flex align-items-center order-lg-3 gap-2">
      
      {% if user.is_authenticated %}
        <div class="dropdown">
          <div class="user-avatar-container dropdown-toggle" data-bs-toggle="dropdown" style="cursor:pointer;">
            <div class="user-avatar shadow-sm">
              {{ user.username|slice:":2"|upper }}
            </div>
          </div>
          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2">
            <li><a class="dropdown-item" href="#">👤 Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Logout</a></li>
          </ul>
        </div>
      {% else %}
        <div class="d-none d-sm-flex gap-2">
          <a href="{% url 'login' %}" class="btn-login">Login</a>
          <a href="{% url 'register' %}" class="btn-signup">Sign Up</a>
        </div>
      {% endif %}

      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <div class="collapse navbar-collapse order-lg-2" id="mobileMenu">
      <ul class="navbar-nav mx-auto nav-links-list mt-3 mt-lg-0">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'faq' %}">FAQ</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'gallary' %}">Gallery</a></li>
        
        {% if not user.is_authenticated %}
        <li class="nav-item d-sm-none mt-2">
          <a class="nav-link text-primary" href="{% url 'login' %}">Login</a>
          <a class="nav-link text-dark fw-bold" href="{% url 'register' %}">Sign Up</a>
        </li>
        {% endif %}
      </ul>
    </div>

  </div>
</nav>

<style>
  :root {
    --primary-blue: #0284c7;
    --navy-dark: #0f172a;
    --text-gray: #64748b;
  }

  .main-navbar-header {
    background: #ffffff;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding: 10px 0;
    position: sticky;
    top: 0;
    z-index: 1100;
  }

  .brand-name {
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--navy-dark);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .text-primary-blue { color: var(--primary-blue); }

  /* Desktop Links Styling */
  .nav-links-list .nav-link {
    color: var(--text-gray) !important;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 10px 15px !important;
    transition: 0.2s;
  }

  .nav-links-list .nav-link:hover { color: var(--primary-blue) !important; }

  /* Auth UI */
  .user-avatar {
    width: 38px;
    height: 38px;
    background: var(--primary-blue);
    color: white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .btn-login { text-decoration: none; color: var(--navy-dark); font-weight: 600; padding: 8px 15px; }
  .btn-signup { 
    text-decoration: none; 
    background: var(--navy-dark); 
    color: white; 
    padding: 8px 20px; 
    border-radius: 10px; 
    font-weight: 600; 
  }

  /* Mobile Dropdown Styling */
  @media (max-width: 991px) {
    .navbar-collapse {
      background: #f8fafc;
      padding: 20px;
      border-radius: 15px;
      margin-top: 15px;
      border: 1px solid rgba(0,0,0,0.05);
    }
  }
</style>
