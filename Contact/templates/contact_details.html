{% extends "Clayout/base.html" %}
{% block Contactblock %}
{% load static %}

<style>
    :root {
        --primary-navy: #0f172a;
        --slate-600: #475569;
        --slate-200: #e2e8f0;
        --accent-blue: #2563eb;
        --bg-soft: #f8fafc;
    }

    /* Reset and Full Height Layout */
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: 'Inter', -apple-system, sans-serif;
        color: var(--primary-navy);
        overflow: hidden;
        /* Updated Background */
        background: 
          linear-gradient(110deg, rgba(255, 255, 255, 0.95) 30%, rgba(240, 249, 255, 0.7) 100%),
          url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
    }

    .fullscreen-wrapper {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Removed radial-gradient to show the background image clearly */
        padding: 20px;
    }

    /* Centering Logic using Flexbox */
    .fullscreen-wrapper {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;    /* Vertical Center */
        justify-content: center; /* Horizontal Center */
        background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
        background-size: 30px 30px;
        padding: 20px;
    }

    /* Professional Card Design */
    .feedback-container {
        width: 100%;
        max-width: 480px;
        background: #ffffff;
        padding: 45px;
        border-radius: 16px;
        border: 1px solid var(--slate-200);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .feedback-container h1 {
        font-size: 1.75rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 8px;
        letter-spacing: -0.025em;
    }

    .subtitle {
        text-align: center;
        color: var(--slate-600);
        font-size: 0.95rem;
        margin-bottom: 35px;
    }

    /* Form Elements */
    .form-group { margin-bottom: 20px; }

    label {
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: var(--slate-600);
        margin-bottom: 8px;
        display: block;
        letter-spacing: 0.05em;
    }

    input[type="text"], input[type="email"] {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        font-size: 1rem;
        color: var(--primary-navy);
        transition: all 0.2s ease;
    }

    input:focus {
        border-color: var(--accent-blue);
        outline: none;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .btn-submit {
        background-color: var(--primary-navy);
        color: white;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.2s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: #000;
        transform: translateY(-1px);
    }

    .message-box {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-weight: 500;
        font-size: 0.9rem;
    }

    /* Mobile Handling */
    @media (max-width: 576px) {
        .feedback-container {
            border: none;
            box-shadow: none;
            background: transparent;
            padding: 20px;
        }
        body { background-color: #ffffff; background-image: none; }
    }
</style>

<div class="fullscreen-wrapper">
    <div class="feedback-container">
        <form method="post">
            {% csrf_token %}
            <h1>System Feedback</h1>
            <p class="subtitle">Your professional input helps us improve.</p>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="mob" placeholder="+1 (555) 000-0000" required>
            </div>

            <div class="form-group">
                <label>Your Feedback</label>
                <input type="text" name="feedback" placeholder="How can we improve?" required>
            </div>

            <button type="submit" name="btn" class="btn-submit">Submit Feedback</button>
        </form>

        {% if MSG %}
        <div class="message-box alert-success mt-3">
            {{ MSG }}
        </div>
        {% endif %}
    </div>
</div>

{% endblock %}
